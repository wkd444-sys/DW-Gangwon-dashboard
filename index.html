<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>강원사무소 직거래</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fbfbf9;color:#33332e;min-height:100vh}
:root{
  --red:#e60023;--ink:#000;--ash:#91918c;--hairline:#dadad3;--hairline-s:#e5e5e0;
  --canvas:#fff;--surface:#f6f6f3;--soft:#fbfbf9;
  --green:#103c25;--green-bg:#c7f0da;--red-bg:#ffe0e0;--red-text:#9e0a0a;
  --orange:#e65100;--orange-bg:#fff3e0;
  --r:16px;--full:9999px;--touch:44px;
}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fbfbf9;padding:24px}
.login-logo{width:44px;height:44px;fill:var(--red);margin-bottom:16px}
.login-title{font-size:20px;font-weight:700;color:var(--ink);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--ash);margin-bottom:32px}
.login-box{width:100%;max-width:320px}
#pw-input{width:100%;height:48px;border-radius:var(--full);border:1.5px solid var(--hairline);padding:0 20px;font-size:16px;font-family:inherit;outline:none;background:#fff;color:#000;text-align:center;letter-spacing:2px}
#pw-input:focus{border-color:var(--ink)}
#login-error{text-align:center;font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
.login-btn{width:100%;height:48px;border-radius:var(--full);border:none;background:var(--red);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px}
#app{display:none}
.nav{background:#fff;border-bottom:1px solid var(--hairline);padding:10px 14px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;min-height:50px}
.nav-brand{display:flex;align-items:center;gap:8px;cursor:pointer}
.nav-logo{width:20px;height:20px;fill:var(--red)}
.nav-title{font-size:14px;font-weight:700;color:var(--ink)}
.upd{font-size:10px;color:var(--ash)}
.rfbtn{min-width:var(--touch);min-height:var(--touch);border-radius:var(--full);border:none;background:var(--surface);color:var(--ash);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.tab-row{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-bottom:1px solid var(--hairline-s)}
.tab{padding:10px 4px;font-size:12px;font-weight:400;color:var(--ash);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:inherit;text-align:center;min-height:var(--touch);display:flex;align-items:center;justify-content:center}
.tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}
.filter-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#fff;border-bottom:1px solid var(--hairline-s);padding:8px 10px}
.chip{padding:7px 4px;font-size:12px;font-weight:700;border-radius:var(--full);border:none;background:var(--surface);color:var(--ink);cursor:pointer;font-family:inherit;text-align:center}
.chip.active{background:var(--red);color:#fff}
.section{padding:10px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:var(--r);padding:12px;border:1px solid var(--hairline-s)}
.stat-lbl{font-size:10px;color:var(--ash);margin-bottom:4px;font-weight:500}
.stat-val{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
.stat-sub{font-size:10px;color:#62625b;margin-top:3px}
.up{color:var(--green)}.dn{color:var(--red-text)}
.purity-box{background:var(--orange-bg);border:1px solid #ffcc80;border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.purity-title{font-size:10px;font-weight:700;color:var(--orange);margin-bottom:8px;letter-spacing:.4px}
.purity-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.purity-item-lbl{font-size:10px;color:var(--ash);margin-bottom:2px}
.purity-item-val{font-size:18px;font-weight:700;color:var(--orange)}
.purity-item-sub{font-size:10px;color:var(--ash);margin-top:1px}
.progress-bar{background:#ffe0b2;border-radius:var(--full);height:8px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:var(--full);background:var(--orange)}
.progress-lbl{font-size:10px;color:var(--ash);text-align:right}
.sec-title{font-size:10px;font-weight:700;color:var(--ash);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}
.card{background:#fff;border:1px solid var(--hairline-s);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 12px 6px}
.card-name{font-size:14px;font-weight:700;color:var(--ink)}
.card-right{text-align:right}
.card-total{font-size:15px;font-weight:700;color:var(--red)}
.card-pred{font-size:10px;color:var(--orange);font-weight:600;margin-top:1px}
.card-body{padding:0 12px 12px}
.month-row{display:flex;align-items:center;margin-bottom:6px;gap:6px;min-height:24px}
.month-lbl{font-size:11px;color:var(--ash);width:24px;flex-shrink:0}
.bar-wrap{flex:1;background:var(--surface);border-radius:var(--full);height:12px;overflow:hidden}
.bar-fill{height:100%;border-radius:var(--full)}
.bar-val{font-size:11px;color:#62625b;width:52px;text-align:right;flex-shrink:0;font-weight:600}
.metric-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.metric{font-size:10px;color:#62625b;background:var(--surface);padding:3px 8px;border-radius:var(--full);white-space:nowrap}
.metric span{font-weight:700;color:var(--ink)}
.ph-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--hairline-s);min-height:var(--touch)}
.ph-row:last-child{border-bottom:none}
.ph-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.rank{width:22px;height:22px;border-radius:var(--full);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.r1{background:var(--red);color:#fff}.r2{background:var(--ink);color:#fff}.r3{background:#62625b;color:#fff}.rn{background:var(--surface);color:var(--ash)}
.ph-info{min-width:0;flex:1}
.ph-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph-sub{font-size:10px;color:var(--ash);margin-top:2px}
.ph-right{text-align:right;flex-shrink:0;margin-left:8px}
.ph-amt{font-size:13px;font-weight:700}
.ph-trend{font-size:10px;margin-top:2px;font-weight:600}
.gauge-wrap{background:var(--surface);border-radius:var(--full);height:8px;overflow:hidden;margin:5px 0 3px}
.gauge-fill{height:100%;border-radius:var(--full)}
.achieve-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--ash)}
.pct-badge{font-size:10px;padding:2px 7px;border-radius:var(--full);font-weight:700;display:inline-block;margin-top:2px}
.up-bg{background:var(--green-bg);color:var(--green)}
.dn-bg{background:var(--red-bg);color:var(--red-text)}
.or-bg{background:var(--orange-bg);color:var(--orange)}
.na-bg{background:var(--surface);color:var(--ash)}
.todo-card{background:#fff;border:1px solid var(--hairline-s);border-radius:var(--r);margin-bottom:8px;overflow:hidden;cursor:pointer}
.todo-card:active{opacity:.85}
.todo-drill{background:#fff8f8;border:1.5px solid #ffd0d0;border-radius:var(--r);margin:-4px 0 10px;padding:4px 0 8px}
.item-panel{background:var(--soft);border:1.5px solid var(--red);border-radius:var(--r);margin:4px 0 8px;overflow:hidden}
.item-panel-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#fff0f2;border-bottom:1px solid #ffd0d8}
.item-panel-title{font-size:13px;font-weight:700;color:var(--red)}
.item-close{border:none;background:none;color:var(--ash);font-size:18px;cursor:pointer;padding:4px;min-width:var(--touch);min-height:var(--touch);display:flex;align-items:center;justify-content:center}
.item-sec{font-size:11px;font-weight:700;padding:8px 12px 2px}
.item-list{padding:0 12px 8px}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--hairline-s);min-height:34px}
.item-row:last-child{border-bottom:none}
.item-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.item-rank{width:18px;height:18px;border-radius:var(--full);background:var(--surface);color:var(--ash);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-name{font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:10px;color:var(--ash);margin-top:1px}
.item-val{font-size:12px;font-weight:700;flex-shrink:0;margin-left:8px}
.ph-sec-title{font-size:12px;font-weight:700;padding:10px 0 5px;border-bottom:1.5px solid var(--hairline);margin-bottom:2px}
.breadcrumb{display:none;align-items:center;gap:6px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--hairline-s);font-size:12px;color:var(--ash)}
.breadcrumb.show{display:flex}
.bc-link{color:var(--red);cursor:pointer;font-weight:600}
.loading{text-align:center;padding:3rem 1rem;color:var(--ash);font-size:14px}
.spinner{width:26px;height:26px;border:2.5px solid var(--hairline);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{margin:12px;padding:18px;border-radius:var(--r);background:#fff0f0;border:1px solid #ffd0d0;text-align:center}
.err-box p{font-size:14px;font-weight:700;color:var(--red);margin-bottom:6px}
.err-box small{font-size:12px;color:#62625b;line-height:1.6;display:block;margin-bottom:10px}
.retry{font-size:14px;font-weight:700;padding:10px 24px;border-radius:var(--full);border:none;background:var(--red);color:#fff;cursor:pointer;font-family:inherit}
#content{padding-bottom:env(safe-area-inset-bottom,16px)}
</style>
</head>
<body>
<div id="login-screen">
  <svg class="login-logo" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>

  <div class="login-box">
    <input id="pw-input" type="password" inputmode="numeric" placeholder="사번 입력">
    <div id="login-error"></div>
    <button class="login-btn" id="login-btn">로그인</button>

</div>
<div id="app">
  <div class="nav">
    <div class="nav-brand" id="nav-brand">
      <svg class="nav-logo" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
      <span class="nav-title">강원사무소 직거래</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="upd" id="upd"></span>
      <button class="rfbtn" id="rfbtn">↺</button>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active" data-tab="H">현황</button>
    <button class="tab" data-tab="M">담당자별</button>
    <button class="tab" data-tab="P">약국별</button>
    <button class="tab" data-tab="T">할일찾기</button>
  </div>
  <div class="filter-row">
    <button class="chip active" data-vc="A">전체</button>
    <button class="chip" data-vc="D">대웅</button>
    <button class="chip" data-vc="B">바이오</button>
    <button class="chip" data-vc="N">한올</button>
  </div>
  <div class="breadcrumb" id="bc"></div>
  <div id="content"><div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div></div>
</div>
<script>
var API='https://script.google.com/macros/s/AKfycbyt42-xsbuStHJSEwPOJgAjNtNfJNbLrBerPFYns4CmnUC6qJ86m9DKAZQ1plEFZoJv/exec';
var MGRS=['장명호','한상인','이강현','박태정','김승현'];
var MOS=['4월','5월','6월','7월'];
var MK=['m4','m5','m6','m7'];
var WORK_TOTAL=24,WORK_DONE=1,PURITY=24;
var VALID_PWS=['1202050234','1202250166','1202250156','1202240450','1202220262'];
var PW_MGR={'1202050234':'장명호','1202250166':'한상인','1202250156':'이강현','1202240450':'박태정','1202220262':'김승현'};
var loginMgr=null;

function doLogin(){
  var pw=document.getElementById('pw-input').value.trim();
  var errEl=document.getElementById('login-error');
  if(VALID_PWS.indexOf(pw)!==-1){
    loginMgr=PW_MGR[pw];
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else {
    errEl.textContent='사번이 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
    setTimeout(function(){errEl.textContent='';},2500);
  }
}
document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

var daily=[],target=[],tab='H',vc='A',drillMgr=null,todoOpen=null,tgtMap={};

function fmt(n){
  if(!n||isNaN(n))return'0';
  var a=Math.abs(n),s=n<0?'-':'';
  if(a>=100000000)return s+(a/100000000).toFixed(1)+'억';
  if(a>=10000000)return s+(a/10000000).toFixed(1)+'천만';
  if(a>=1000000)return s+(a/1000000).toFixed(1)+'백만';
  if(a>=10000)return s+Math.round(a/10000)+'만';
  return Math.round(n).toLocaleString();
}

// 키: m7,m6,m5,m4 (Apps Script에서 단순 키로 변경됨)
function gm(r,mk){return r[mk]||0;}

function fvc(rows){
  if(vc==='A')return rows;
  var map={'D':'대웅제약','B':'대웅바이오','N':'한올바이오'};
  return rows.filter(function(r){return r.vc===map[vc];});
}

function getTgt(code,field){
  var t=tgtMap[String(code)];
  if(!t)return 0;
  var vcmap={'A':'합계','D':'대웅','B':'바이오','N':'한올'};
  var ch=vcmap[vc]||'합계';
  var v=t[ch+'(기)'];
  if(field==='목표')v=t[ch+'(목표)'];
  return typeof v==='number'?v:0;
}

function calcAch(s,b,g){return g>0?Math.round((s-b)/g*100):null;}
function gaugeColor(p){return p===null?'#c8c8c1':p>=100?'#e60023':p>=70?'#FA8C16':'#91918c';}
function pctBadge(p){
  if(p===null)return '<span class="pct-badge na-bg">-</span>';
  var cls=p>=100?'up-bg':p>=70?'or-bg':'dn-bg';
  return '<span class="pct-badge '+cls+'">'+p+'%</span>';
}

function byPh(rows){
  var m={};
  rows.forEach(function(r){
    var k=r.code+'|'+r.ph+'|'+r.mgr;
    if(!m[k])m[k]={code:r.code,name:r.ph,mgr:r.mgr,m7:0,m6:0,m5:0,m4:0};
    m[k].m7+=r.m7;m[k].m6+=r.m6;m[k].m5+=r.m5;m[k].m4+=r.m4;
  });
  return Object.values(m);
}

function byMgr(rows){
  var res={};
  MGRS.forEach(function(m){res[m]={m7:0,m6:0,m5:0,m4:0};});
  rows.forEach(function(r){
    if(!res[r.mgr])return;
    res[r.mgr].m7+=r.m7;res[r.mgr].m6+=r.m6;res[r.mgr].m5+=r.m5;res[r.mgr].m4+=r.m4;
  });
  return res;
}

function renderStatus(f,bm){
  var tot={m7:0,m6:0,m5:0,m4:0};
  MGRS.forEach(function(m){tot.m7+=bm[m].m7;tot.m6+=bm[m].m6;tot.m5+=bm[m].m5;tot.m4+=bm[m].m4;});
  var cur=tot.m7,prev=tot.m6,diff=cur-prev;
  var pct=prev>0?(diff/prev*100):0;
  var maxT=Math.max(tot.m7,tot.m6,tot.m5,tot.m4,1);
  var phList=byPh(f);
  var tBase=0,tGoal=0;
  phList.forEach(function(p){tBase+=getTgt(p.code,'기');tGoal+=getTgt(p.code,'목표');});
  var tAch=calcAch(cur,tBase,tGoal);
  var pred=Math.round(cur*PURITY);
  var predAch=tGoal>0?Math.round((pred-tBase)/tGoal*100):null;
  var progW=Math.min(Math.round(WORK_DONE/WORK_TOTAL*100),100);

  var bars='';
  MOS.forEach(function(mo,i){
    var v=tot[MK[i]],p=Math.round(v/maxT*100),color=i===3?'#e60023':'#c8c8c1';
    bars+='<div class="month-row"><span class="month-lbl">'+mo+'</span><div class="bar-wrap"><div class="bar-fill" style="width:'+p+'%;background:'+color+'"></div></div><span class="bar-val">'+fmt(v)+'</span></div>';
  });

  var mgrCards=MGRS.map(function(m){
    var v7=bm[m].m7,v6=bm[m].m6,d=v7-v6;
    var mp=phList.filter(function(p){return p.mgr===m;});
    var mb=0,mg=0;
    mp.forEach(function(p){mb+=getTgt(p.code,'기');mg+=getTgt(p.code,'목표');});
    var mAch=calcAch(v7,mb,mg),pred2=Math.round(v7*PURITY);
    return '<div class="card" style="cursor:pointer" onclick="drillToMgr(\''+m+'\')">'+
      '<div class="card-header"><span class="card-name">'+m+'</span>'+
      '<div class="card-right"><div class="card-total">'+fmt(v7)+'</div>'+
      '<div class="card-pred">예측 '+fmt(pred2)+'</div>'+
      pctBadge(mAch)+'</div></div>'+
      '<div class="card-body"><div class="metric-row">'+
      (mb>0?'<div class="metric">기준점 <span>'+fmt(mb)+'</span></div>':'')+
      (mg>0?'<div class="metric">목표 <span>'+fmt(mg)+'</span></div>':'')+
      '<div class="metric">전월比 <span class="'+(d>=0?'up':'dn')+'">'+(d>=0?'+':'')+fmt(d)+'</span></div>'+
      '</div></div></div>';
  }).join('');

  var ap=new Set(f.filter(function(r){return r.m7>0;}).map(function(r){return r.ph;})).size;
  var tp=new Set(f.map(function(r){return r.ph;})).size;

  return '<div class="section">'+
    '<div class="stat-grid">'+
    '<div class="stat-card"><div class="stat-lbl">7월 누계</div><div class="stat-val">'+fmt(cur)+'</div><div class="stat-sub"><span class="'+(diff>=0?'up':'dn')+'">'+(diff>=0?'▲':'▼')+fmt(Math.abs(diff))+'</span> 전월비</div></div>'+
    '<div class="stat-card"><div class="stat-lbl">7월 달성률</div><div class="stat-val" style="color:'+gaugeColor(tAch)+'">'+(tAch!==null?tAch+'%':'-')+'</div><div class="stat-sub">목표 +'+fmt(tGoal)+'</div></div>'+
    '<div class="stat-card"><div class="stat-lbl">6월 확정</div><div class="stat-val">'+fmt(prev)+'</div><div class="stat-sub"><span class="'+(diff>=0?'up':'dn')+'">'+(pct>=0?'+':'')+pct.toFixed(1)+'%</span></div></div>'+
    '<div class="stat-card"><div class="stat-lbl">활성 약국</div><div class="stat-val">'+ap+'</div><div class="stat-sub">전체 '+tp+'처</div></div>'+
    '</div>'+
    '<div class="purity-box">'+
    '<div class="purity-title">📊 순도 예측 (영업일 '+WORK_DONE+'/'+WORK_TOTAL+'일 기준)</div>'+
    '<div class="purity-grid">'+
    '<div><div class="purity-item-lbl">예측 월매출</div><div class="purity-item-val">'+fmt(pred)+'</div><div class="purity-item-sub">현재 '+fmt(cur)+' \xd7 '+PURITY+'배</div></div>'+
    '<div><div class="purity-item-lbl">예측 달성률</div><div class="purity-item-val" style="color:'+(predAch!==null?gaugeColor(predAch):'var(--ash)')+'">'+(predAch!==null?predAch+'%':'-')+'</div><div class="purity-item-sub">목표 +'+fmt(tGoal)+'</div></div>'+
    '</div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+progW+'%"></div></div>'+
    '<div class="progress-lbl">진행 '+progW+'% (7월 '+WORK_DONE+'일/'+WORK_TOTAL+'영업일)</div>'+
    '</div>'+
    '<div class="sec-title">월별 추이</div>'+
    '<div class="card"><div class="card-body" style="padding-top:12px">'+bars+'</div></div>'+
    '<div class="sec-title" style="margin-top:12px">담당자별 현황</div>'+
    mgrCards+'</div>';
}

function renderManagers(f,bm,filter){
  var phList=byPh(f);
  var targets=filter?MGRS.filter(function(m){return m===filter;}):MGRS;
  var html='<div class="section">';
  targets.forEach(function(m){
    var v7=bm[m].m7,v6=bm[m].m6,v5=bm[m].m5,v4=bm[m].m4;
    var vals=[v4,v5,v6,v7],maxV=Math.max.apply(null,vals.concat([1]));
    var mp=phList.filter(function(p){return p.mgr===m;});
    var mb=0,mg=0;
    mp.forEach(function(p){mb+=getTgt(p.code,'기');mg+=getTgt(p.code,'목표');});
    var mAch=calcAch(v7,mb,mg),gW=mAch!==null?Math.min(mAch,150):0;
    var pred=Math.round(v7*PURITY),predAch=mg>0?Math.round((pred-mb)/mg*100):null;
    var bars='';
    MOS.forEach(function(mo,i){
      var v=vals[i],p=Math.round(v/maxV*100),isCur=i===3;
      bars+='<div class="month-row">'+
        '<span class="month-lbl">'+mo+'</span>'+
        '<div class="bar-wrap"><div class="bar-fill" style="width:'+p+'%;background:'+(isCur?'#e60023':'#c8c8c1')+'"></div></div>'+
        '<span class="bar-val">'+fmt(v)+'</span></div>';
    });
    html+='<div class="card"><div class="card-header"><span class="card-name">'+m+'</span>'+
      '<div class="card-right"><div class="card-total">'+fmt(v7)+'</div>'+
      '<div class="card-pred">예측 '+fmt(pred)+'</div>'+
      (predAch!==null?'<div style="font-size:11px;font-weight:700;color:'+gaugeColor(predAch)+'">예측 '+predAch+'%</div>':'')+
      pctBadge(mAch)+'</div></div>'+
      '<div class="card-body">'+
      (mg>0?'<div class="gauge-wrap"><div class="gauge-fill" style="width:'+gW+'%;background:'+gaugeColor(mAch)+'"></div></div><div class="achieve-nums"><span>기준점 '+fmt(mb)+'</span><span>목표 +'+fmt(mg)+'</span></div>':'')+
      '<div class="metric-row"><div class="metric">전월比 <span class="'+(v7-v6>=0?'up':'dn')+'">'+(v7-v6>=0?'+':'')+fmt(v7-v6)+'</span></div></div>'+
      bars+'<div style="font-size:11px;color:var(--red);margin-top:6px;cursor:pointer" onclick="drillToPhByMgr(\''+m+'\')">▶ '+m+' 약국 상세</div>'+
      '</div></div>';
  });
  return html+'</div>';
}

function renderPharmacy(f,filter){
  var phAll=byPh(f);
  var targets=filter?MGRS.filter(function(m){return m===filter;}):MGRS;
  var html='<div class="section">';
  targets.forEach(function(m){
    var mp=phAll.filter(function(p){return p.mgr===m&&(p.m7>0||p.m6>0||p.m5>0||p.m4>0);});
    if(!mp.length)return;
    var withDiff=mp.map(function(p){var avg3=(p.m6+p.m5+p.m4)/3;return Object.assign({},p,{avg3:avg3,diff:p.m7-avg3});});
    var upList=withDiff.filter(function(p){return p.diff>0;}).sort(function(a,b){return b.diff-a.diff;}).slice(0,10);
    var dnList=withDiff.filter(function(p){return p.diff<0;}).sort(function(a,b){return a.diff-b.diff;}).slice(0,10);
    html+='<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:700;padding:8px 0 6px;border-bottom:2px solid var(--hairline)">'+m+'</div>';
    if(upList.length){
      html+='<div class="ph-sec-title up">▲ 직전3개월比 증가 Top '+upList.length+'</div><div class="card"><div class="card-body" style="padding-top:4px">';
      upList.forEach(function(p,i){
        var base=getTgt(p.code,'기'),goal=getTgt(p.code,'목표'),ach=calcAch(p.m7,base,goal);
        var rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
        html+='<div id="ph-row-'+p.code+'-up" class="ph-row" style="cursor:pointer" onclick="toggleItemPanel(\''+p.code+'\',\''+p.name.replace(/'/g,'')+'\')">';
        html+='<div class="ph-left"><div class="rank '+rc+'">'+i+1+'</div><div class="ph-info"><div class="ph-name">'+p.name+'</div><div class="ph-sub">3개월평균 '+fmt(p.avg3)+' \xb7 증가 '+fmt(p.diff)+'</div></div></div>';
        html+='<div class="ph-right"><div class="ph-amt">'+fmt(p.m7)+'</div><div class="ph-trend up">▲'+fmt(p.diff)+'</div>'+pctBadge(ach)+'</div></div>';
      });
      html+='</div></div>';
    }
    if(dnList.length){
      html+='<div class="ph-sec-title dn">▼ 직전3개월比 감소 Top '+dnList.length+'</div><div class="card"><div class="card-body" style="padding-top:4px">';
      dnList.forEach(function(p,i){
        var base=getTgt(p.code,'기'),goal=getTgt(p.code,'목표'),ach=calcAch(p.m7,base,goal);
        html+='<div id="ph-row-'+p.code+'-dn" class="ph-row" style="cursor:pointer" onclick="toggleItemPanel(\''+p.code+'\',\''+p.name.replace(/'/g,'')+'\')">';
        html+='<div class="ph-left"><div class="rank rn">'+i+1+'</div><div class="ph-info"><div class="ph-name">'+p.name+'</div><div class="ph-sub">3개월평균 '+fmt(p.avg3)+' \xb7 7월 '+fmt(p.m7)+'</div></div></div>';
        html+='<div class="ph-right"><div class="ph-amt">'+fmt(p.m7)+'</div><div class="ph-trend dn">▼'+fmt(Math.abs(p.diff))+'</div>'+pctBadge(ach)+'</div></div>';
      });
      html+='</div></div>';
    }
    html+='</div>';
  });
  return html+'</div>';
}

function toggleItemPanel(code,name){
  var existing=document.getElementById('item-panel-'+code);
  if(existing){existing.remove();return;}
  document.querySelectorAll('.item-panel').forEach(function(el){el.remove();});
  var rows=daily.filter(function(r){return String(r.code).trim()===String(code).trim();});
  var iMap={};
  rows.forEach(function(r){
    var k=r.item;if(!k)return;
    if(!iMap[k])iMap[k]={name:k,m7:0,m6:0,m5:0,m4:0,vc:r.vc};
    iMap[k].m7+=r.m7;iMap[k].m6+=r.m6;iMap[k].m5+=r.m5;iMap[k].m4+=r.m4;
  });
  var items=Object.values(iMap).map(function(it){var avg3=(it.m6+it.m5+it.m4)/3;return Object.assign({},it,{avg3:avg3,diff:it.m7-avg3});});
  var up5=items.filter(function(it){return it.diff>0;}).sort(function(a,b){return b.diff-a.diff;}).slice(0,5);
  var dn5=items.filter(function(it){return it.diff<0;}).sort(function(a,b){return a.diff-b.diff;}).slice(0,5);
  var newI=items.filter(function(it){return it.m7>0&&it.m6===0&&it.m5===0&&it.m4===0;});
  var lostI=items.filter(function(it){return it.m7===0&&(it.m6>0||it.m5>0||it.m4>0);});
  var html='<div class="item-panel" id="item-panel-'+code+'">'+
    '<div class="item-panel-hdr"><span class="item-panel-title">📦 '+name+'</span>'+
    '<button class="item-close" onclick="document.getElementById(\'item-panel-'+code+'\').remove()">✕</button></div>';
  if(newI.length){html+='<div class="item-sec" style="color:var(--red)">🆕 신규</div><div class="item-list">';newI.forEach(function(it){html+='<div class="item-row"><span class="item-name">'+it.name+'</span><span class="item-val up">+'+fmt(it.m7)+'</span></div>';});html+='</div>';}
  if(up5.length){html+='<div class="item-sec" style="color:var(--green)">▲ 증가 Top5</div><div class="item-list">';up5.forEach(function(it,i){html+='<div class="item-row"><div class="item-left"><span class="item-rank">'+(i+1)+'</span><div><div class="item-name">'+it.name+'</div><div class="item-sub">3개월평균 '+fmt(it.avg3)+' → 7월 '+fmt(it.m7)+'</div></div></div><span class="item-val up">▲'+fmt(it.diff)+'</span></div>';});html+='</div>';}
  if(dn5.length){html+='<div class="item-sec" style="color:var(--red-text)">▼ 감소 Top5</div><div class="item-list">';dn5.forEach(function(it,i){html+='<div class="item-row"><div class="item-left"><span class="item-rank">'+(i+1)+'</span><div><div class="item-name">'+it.name+'</div><div class="item-sub">3개월평균 '+fmt(it.avg3)+' → 7월 '+fmt(it.m7)+'</div></div></div><span class="item-val dn">▼'+fmt(Math.abs(it.diff))+'</span></div>';});html+='</div>';}
  if(lostI.length){html+='<div class="item-sec" style="color:var(--ash)">⚠️ 이탈</div><div class="item-list">';lostI.forEach(function(it){html+='<div class="item-row"><span class="item-name">'+it.name+'</span><span class="item-val" style="color:var(--ash)">직전 '+fmt(it.m6||it.m5||it.m4)+'</span></div>';});html+='</div>';}
  if(!up5.length&&!dn5.length&&!newI.length&&!lostI.length)html+='<div style="padding:16px;text-align:center;font-size:13px;color:var(--ash)">품목 데이터 없음</div>';
  html+='</div>';
  var row=document.getElementById('ph-row-'+code+'-up')||document.getElementById('ph-row-'+code+'-dn');
  if(row){var d=document.createElement('div');d.innerHTML=html;row.insertAdjacentElement('afterend',d.firstChild);}
}

function renderTodo(f){
  var phList=byPh(f);
  var mgrData=MGRS.map(function(m){
    var mp=phList.map(function(p){
      var base=getTgt(p.code,'기'),goal=getTgt(p.code,'목표');
      return Object.assign({},p,{base:base,goal:goal,target:base+goal,_has:goal>0});
    }).filter(function(p){return p.mgr===m&&p._has;});
    var tb=0,tg=0,ts=0;
    mp.forEach(function(p){tb+=p.base;tg+=p.goal;ts+=p.m7;});
    var tt=tb+tg,gap=tt-ts,ach=calcAch(ts,tb,tg);
    var sorted=mp.filter(function(p){return p.target>p.m7;}).sort(function(a,b){return(b.target-b.m7)-(a.target-a.m7);});
    var done=mp.filter(function(p){return p.target<=p.m7;});
    return {m:m,tb:tb,tg:tg,tt:tt,gap:gap,ts:ts,ach:ach,sorted:sorted,done:done};
  });
  var html='<div class="section"><div class="sec-title">목표까지 남은 GAP (기준점+목표 - 7월매출)</div>';
  mgrData.forEach(function(d){
    var isOpen=todoOpen===d.m,gW=d.ach!==null?Math.min(d.ach,150):0;
    var gapCls=d.gap>0?'dn-bg':'up-bg',gapStr=d.gap>0?'▼'+fmt(d.gap)+' 부족':'✓'+fmt(Math.abs(d.gap))+' 초과';
    html+='<div class="todo-card" onclick="toggleTodo(\''+d.m+'\')">';
    html+='<div class="card-header"><div><div class="card-name">'+d.m+'</div><div style="font-size:11px;color:var(--ash);margin-top:2px">목표 '+fmt(d.tt)+' → 7월 '+fmt(d.ts)+'</div></div>';
    html+='<div class="card-right"><div class="card-total" style="color:'+gaugeColor(d.ach)+'">'+(d.ach!==null?d.ach+'%':'-')+'</div>';
    html+='<span class="pct-badge '+gapCls+'" style="font-size:11px;padding:3px 8px;margin-top:2px">'+gapStr+'</span></div></div>';
    html+='<div class="card-body">';
    if(d.tg>0)html+='<div class="gauge-wrap"><div class="gauge-fill" style="width:'+gW+'%;background:'+gaugeColor(d.ach)+'"></div></div><div class="achieve-nums"><span>기준점 '+fmt(d.tb)+'</span><span>+목표 '+fmt(d.tg)+'</span></div>';
    html+='<div style="font-size:11px;color:var(--red);margin-top:6px;text-align:right">'+(isOpen?'▲ 접기':'▼ 약국별 상세')+'</div></div></div>';
    if(isOpen){
      html+='<div class="todo-drill" id="todo-drill-'+d.m+'">';
      if(d.sorted.length){
        html+='<div style="font-size:11px;font-weight:700;color:var(--red-text);padding:10px 14px 4px">🎯 GAP 큰 순</div><div style="padding:0 12px">';
        d.sorted.forEach(function(p,i){
          var rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn',g=p.target-p.m7;
          html+='<div class="ph-row"><div class="ph-left"><div class="rank '+rc+'">'+i+1+'</div><div class="ph-info"><div class="ph-name">'+p.name+'</div><div class="ph-sub">목표 '+fmt(p.target)+' \xb7 7월 '+fmt(p.m7)+'</div></div></div><div class="ph-right"><div style="font-size:13px;font-weight:700;color:var(--red-text)">▼'+fmt(g)+'</div>'+pctBadge(calcAch(p.m7,p.base,p.goal))+'</div></div>';
        });
        html+='</div>';
      }
      if(d.done.length){
        html+='<div style="font-size:11px;font-weight:700;color:var(--green);padding:8px 14px 4px">✅ 목표 초과</div><div style="padding:0 12px">';
        d.done.forEach(function(p){
          html+='<div class="ph-row"><div class="ph-left"><div class="rank" style="background:var(--green-bg);color:var(--green)">✓</div><div class="ph-info"><div class="ph-name">'+p.name+'</div><div class="ph-sub">목표 '+fmt(p.target)+' \xb7 7월 '+fmt(p.m7)+'</div></div></div><div class="ph-right"><div style="font-size:13px;font-weight:700;color:var(--green)">+'+fmt(Math.abs(p.target-p.m7))+'</div></div></div>';
        });
        html+='</div>';
      }
      html+='</div>';
    }
  });
  return html+'</div>';
}

function updateBc(){
  var bc=document.getElementById('bc');
  if(!drillMgr){bc.className='breadcrumb';return;}
  bc.className='breadcrumb show';
  bc.innerHTML='<span class="bc-link" onclick="goHome()">현황</span> › <span>'+drillMgr+'</span><span style="margin-left:auto;color:var(--red);cursor:pointer" onclick="goHome()">✕</span>';
}
function goHome(){drillMgr=null;switchTab('H');}
function drillToMgr(m){drillMgr=m;switchTab('M');}
function drillToPhByMgr(m){drillMgr=m;switchTab('P');}
function toggleTodo(m){
  todoOpen=todoOpen===m?null:m;render();
  if(todoOpen){setTimeout(function(){var el=document.getElementById('todo-drill-'+m);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);}
}

function switchTab(t){
  tab=t;drillMgr=null;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('active',b.dataset.tab===t);});
  render();
}

function render(){
  var f=fvc(daily),bm=byMgr(f),el=document.getElementById('content');
  updateBc();
  if(tab==='H')el.innerHTML=renderStatus(f,bm);
  else if(tab==='M')el.innerHTML=renderManagers(f,bm,drillMgr);
  else if(tab==='P')el.innerHTML=renderPharmacy(f,drillMgr);
  else el.innerHTML=renderTodo(f);
}

document.querySelectorAll('.tab').forEach(function(b){
  b.addEventListener('click',function(){switchTab(b.dataset.tab);});
});
document.querySelectorAll('.chip').forEach(function(b){
  b.addEventListener('click',function(){
    vc=b.dataset.vc;
    document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');render();
  });
});
document.getElementById('nav-brand').addEventListener('click',goHome);
document.getElementById('rfbtn').addEventListener('click',loadData);

function loadData(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>';
  document.getElementById('upd').textContent='';
  var cb='cb_'+Date.now(),s=document.createElement('script');
  s.src=API+'?callback='+cb;
  var timer=setTimeout(function(){
    document.getElementById('content').innerHTML='<div class="err-box"><p>응답 시간 초과</p><small>잠시 후 다시 시도해 주세요.</small><br><button class="retry" onclick="loadData()">다시 시도</button></div>';
    delete window[cb];try{document.head.removeChild(s);}catch(e){}
  },30000);
  window[cb]=function(data){
    clearTimeout(timer);delete window[cb];try{document.head.removeChild(s);}catch(e){}
    if(data&&data.daily&&data.target){
      daily=data.daily;
      target=data.target;
      tgtMap={};
      target.forEach(function(t){var c=String(t.c||'').trim();if(c)tgtMap[c]=t;});
      if(!daily.length){document.getElementById('content').innerHTML='<div class="err-box"><p>데이터 없음</p></div>';return;}
      document.getElementById('upd').textContent='업데이트 '+new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      render();
    }
  };
  s.onerror=function(){clearTimeout(timer);delete window[cb];document.getElementById('content').innerHTML='<div class="err-box"><p>연결 실패</p><button class="retry" onclick="loadData()">다시 시도</button></div>';};
  document.head.appendChild(s);
}
</script>
