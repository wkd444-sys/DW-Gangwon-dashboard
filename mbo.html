
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{

  --sunshine-700:#ffa110;--sunshine-500:#ffb83e;--yellow-sat:#ffd900;
  --cream:#fff8e0;--cream-light:#fffaeb;--cream-deeper:#fff0c2;--beige-deep:#e6d5a8;
  --ink:#1f1f1f;--ink-tint:#3d3d3d;--steel:#6a6a6a;--stone:#8a8a8a;--muted:#a8a8a8;
  --hairline:#e5e5e5;--hairline-soft:#ededed;--hairline-strong:#c7c7c7;
  --canvas:#fff;--surface:#fafafa;
  --r-md:8px;--r-lg:12px;--r-full:9999px;
  --green:#1baf7a;--red:#fa520f;--amber:#ffa110;

body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink)}
.shell{display:flex;flex-direction:column;min-height:580px}
.topnav{background:var(--canvas);border-bottom:1px solid var(--hairline-soft);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px}
.brand-mark{width:22px;height:22px;background:var(--primary);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.brand-name{font-size:13px;font-weight:600}
.brand-sub{font-size:10px;color:var(--stone);letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.badge-cnt{background:var(--primary);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-full)}

.page-hdr{background:var(--cream);border-bottom:1px solid var(--beige-deep);padding:14px 20px 12px}
.page-title{font-size:20px;font-weight:400;color:var(--ink);font-family:'Georgia',serif;letter-spacing:-.3px}
.page-sub{font-size:12px;color:var(--steel);margin-top:2px}

.tab-row{display:flex;border-bottom:1px solid var(--hairline-soft);background:var(--canvas);padding:0 20px}
.tab{font-size:12px;font-weight:500;color:var(--steel);background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;cursor:pointer;margin-bottom:-1px}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}

.filter-bar{background:var(--canvas);border-bottom:1px solid var(--hairline-soft);padding:8px 20px;display:flex;gap:8px;align-items:center}
.filter-bar select{font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--hairline-strong);border-radius:var(--r-md);background:var(--canvas);color:var(--ink);cursor:pointer}
.filter-bar select:focus{outline:none;border-color:var(--primary)}
.f-cnt{font-size:11px;color:var(--stone);margin-left:auto}

.main{padding:14px 20px;flex:1}
.page{display:none}.page.on{display:block}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:var(--r-lg);padding:11px 13px}
.kpi.alert{background:var(--cream);border-color:var(--beige-deep)}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.kpi-val{font-size:22px;font-weight:400;font-family:'Georgia',serif;line-height:1}
.kpi-val.orange{color:var(--primary)}
.kpi-val.green{color:var(--green)}
.kpi-val.amber{color:var(--amber)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}

.sec-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--stone);margin-bottom:8px;margin-top:14px}

.tbl-wrap{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:var(--r-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:8px 10px;text-align:left;border-bottom:1px solid var(--hairline);font-weight:600;font-size:10px;color:var(--stone);letter-spacing:.3px;background:var(--cream-light);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--hairline-soft);color:var(--ink-tint);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fefcf5}
.badge{display:inline-block;padding:2px 7px;border-radius:var(--r-full);font-size:10px;font-weight:600;white-space:nowrap}
.b-green{background:#e6f4ea;color:#1b5e20}
.b-red{background:#fcebeb;color:#7f0000}
.b-amber{background:#faeeda;color:#6b3c05}
.b-gray{background:var(--hairline);color:var(--steel)}
.b-orange{background:var(--primary);color:#fff}

.diff-pos{color:var(--green);font-weight:600}
.diff-neg{color:var(--red);font-weight:600}
.diff-zero{color:var(--stone)}

.mr-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:var(--r-lg);padding:13px 16px;margin-bottom:8px}
.mr-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mr-name{font-size:14px;font-weight:600}
.mr-pct{font-size:20px;font-weight:400;font-family:'Georgia',serif}
.bar-bg{background:var(--hairline);border-radius:3px;height:5px;overflow:hidden;margin-bottom:10px}
.bar-fill{height:5px;border-radius:3px}
.chips{display:flex;gap:6px;flex-wrap:wrap;font-size:11px}
.chip{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-full);padding:3px 9px;color:var(--ink-tint)}
.miss-box{margin-top:8px;font-size:11px;color:var(--primary);background:var(--cream-light);border-radius:var(--r-md);padding:6px 10px;border:1px solid var(--beige-deep);line-height:1.6}

.sunset{height:5px;background:linear-gradient(90deg,var(--primary) 0%,var(--sunshine-700) 30%,var(--sunshine-500) 60%,var(--yellow-sat) 85%,var(--cream) 100%);margin-top:auto}
</style>

const MRS=[...new Set(DATA.map(d=>d.mr))].sort();
const sel=document.getElementById('f-mr');
MRS.forEach(mr=>{const o=document.createElement('option');o.value=mr;o.text=mr;sel.appendChild(o);});

function gf(){return{mr:document.getElementById('f-mr').value, status:document.getElementById('f-status').value};}
function filtered(){
  const {mr,status}=gf();
  return DATA.filter(r=>(!mr||r.mr===mr)&&(!status||r.status.includes(status.replace('매일MBO 초과','초과').replace('매일MBO 미달','미달').replace('매일MBO 미등록','매일MBO없음'))));

function statusBadge(s){
  if(s==='일치') return '<span class="badge b-green">일치</span>';
  if(s==='초과') return '<span class="badge b-orange">매일MBO↑</span>';
  if(s==='미달') return '<span class="badge b-amber">매일MBO↓</span>';
  if(s==='매일MBO없음') return '<span class="badge b-red">미등록</span>';
  return '<span class="badge b-gray">둘다0</span>';
}

function diffCell(d,s){
  if(s==='일치'||s==='둘다0') return `<span class="diff-zero">—</span>`;
  if(d>0) return `<span class="diff-pos">+${d.toLocaleString()}</span>`;
  return `<span class="diff-neg">${d.toLocaleString()}</span>`;
}

let curTab='compare';
function go(tab,btn){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+tab).classList.add('on');
  render();
}
function render(){
  if(curTab==='compare') renderCompare();
  else if(curTab==='miss') renderMiss();
  else renderMR();
}

    <div class="kpi"><div class="kpi-lbl">일치</div><div class="kpi-val green">${cnt['일치']||0}</div><div class="kpi-sub">정확히 동일</div></div>
    <div class="kpi"><div class="kpi-lbl">매일MBO↑</div><div class="kpi-val green">${cnt['초과']||0}</div><div class="kpi-sub">H열보다 높게 수립</div></div>
    <div class="kpi"><div class="kpi-lbl">매일MBO↓</div><div class="kpi-val amber">${cnt['미달']||0}</div><div class="kpi-sub">H열보다 낮게 수립</div></div>
    <div class="kpi"><div class="kpi-lbl">둘다 0</div><div class="kpi-val" style="color:var(--stone)">${cnt['둘다0']||0}</div><div class="kpi-sub">미수립</div></div>
  </div>
  <div class="tbl-wrap"><table>
  <colgroup><col style="width:12%"><col style="width:22%"><col style="width:13%"><col style="width:13%"><col style="width:13%"><col style="width:13%"><col style="width:14%"></colgroup>
  <thead><tr>
    <th>담당자</th><th>거래처</th>
    <th style="text-align:right">H열 성장MBO</th>
    <th style="text-align:right">7월MBO</th>
    <th style="text-align:right">매일MBO</th>
    <th style="text-align:right">차이</th>
    <th>상태</th>
  </tr></thead><tbody>`;

  rows.forEach(r=>{
    h+=`<tr>
      <td style="font-weight:500">${r.mr}</td>
      <td title="${r.clinic}">${r.clinic}</td>
      <td style="text-align:right">${r.growth_mbo?r.growth_mbo.toLocaleString():''}</td>
      <td style="text-align:right">${r.mbo7?r.mbo7.toLocaleString():''}</td>
      <td style="text-align:right">${r.daily_pex?r.daily_pex.toLocaleString():''}</td>
      <td style="text-align:right">${diffCell(r.diff,r.status)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('pg-compare').innerHTML=h;
}

function renderMiss(){
  const miss=DATA.filter(r=>r.status==='매일MBO없음'&&(!gf().mr||r.mr===gf().mr));
  document.getElementById('top-badge').textContent=`미등록 ${miss.length}건`;
  document.getElementById('f-cnt').textContent=`${miss.length}건`;

  // 담당자별 그룹
  const byMR={};
  miss.forEach(r=>{if(!byMR[r.mr])byMR[r.mr]=[];byMR[r.mr].push(r);});

  let h=`<div class="kpi-row">
    <div class="kpi alert"><div class="kpi-lbl">총 미등록</div><div class="kpi-val orange">${miss.length}</div><div class="kpi-sub">즉시 수립 필요</div></div>
    <div class="kpi"><div class="kpi-lbl">미등록 H열합계</div><div class="kpi-val">${miss.reduce((s,r)=>s+r.growth_mbo,0).toLocaleString()}</div><div class="kpi-sub">목표 성장금액</div></div>
  </div>
  <div class="sec-label">담당자별 미등록 거래처</div>`;

  Object.entries(byMR).forEach(([mr,rows])=>{
    const total=rows.reduce((s,r)=>s+r.growth_mbo,0);
    h+=`<div style="background:var(--canvas);border:1px solid var(--hairline-soft);border-left:3px solid var(--primary);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">${mr}</span>
        <span style="font-size:11px;color:var(--stone)">${rows.length}곳 · H열 목표합계 <strong style="color:var(--primary)">${total.toLocaleString()}</strong></span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${rows.map(r=>`<span style="font-size:11px;background:var(--cream-light);border:1px solid var(--beige-deep);border-radius:var(--r-full);padding:3px 9px;color:var(--ink-tint)">${r.clinic} <span style="color:var(--stone)">(목표 ${r.growth_mbo.toLocaleString()})</span></span>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('pg-miss').innerHTML=h;
}

function renderMR(){
  document.getElementById('top-badge').textContent='담당자별';
  document.getElementById('f-cnt').textContent='';
  const {status}=gf();
  let h='';
  MRS.forEach(mr=>{
    const rows=DATA.filter(r=>r.mr===mr&&(!status||r.status.includes(status)));
    if(!rows.length) return;
    const match=rows.filter(r=>r.status==='일치').length;
    const over=rows.filter(r=>r.status==='초과').length;
    const under=rows.filter(r=>r.status==='미달').length;
    const none=rows.filter(r=>r.status==='매일MBO없음').length;
    const reg=rows.length-none;
    const pct=Math.round(reg/rows.length*100);
    const col=pct>=70?'#1baf7a':pct>=40?'#ffa110':'#fa520f';
    h+=`<div class="mr-card">
  <div class="mr-head">
    <div><span class="mr-name">${mr}</span><span style="font-size:11px;color:var(--stone);margin-left:8px">총 ${rows.length}개 거래처</span></div>
    <div style="text-align:right"><span class="mr-pct" style="color:${col}">${pct}%</span><span style="font-size:10px;color:var(--muted);display:block">등록률</span></div>
  </div>
  <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
  <div class="chips">
    <span class="chip">✓ 일치 ${match}</span>
    <span class="chip" style="color:var(--green)">↑ 초과 ${over}</span>
    <span class="chip" style="color:var(--amber)">↓ 미달 ${under}</span>
    <span class="chip" style="color:var(--red)">✕ 미등록 ${none}</span>
  </div>
  ${none?`<div class="miss-box">미등록: ${rows.filter(r=>r.status==='매일MBO없음').map(r=>r.clinic).join(' · ')}</div>`:''}
</div>`;
  });
  document.getElementById('pg-mr').innerHTML=h;
}

renderCompare();
</script>
